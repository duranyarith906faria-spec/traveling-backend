# =============================================
# TRAVELING - Configuracion Backend
# TRAV-14: Conectar backend con base de datos
# =============================================

server.port=8080

# Para que los mensajes de validacion (RuntimeException, @Valid) lleguen
# al frontend en el campo "message" de la respuesta de error, en vez de
# perderse en un 500 generico.
server.error.include-message=always
server.error.include-binding-errors=always

# --- Conexion MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/traveling_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect