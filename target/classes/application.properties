# =============================================
# TRAVELING - Configuracion Backend
# TRAV-14: Conectar backend con base de datos
# =============================================

server.port=8080

# Para que los mensajes de validacion (RuntimeException, @Valid) lleguen
# al frontend en el campo "message" de la respuesta de error, en vez de
# perderse en un 500 generico.
server.error.include-message=always
server.error.include-binding-errors=always

# --- Conexion MySQL ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Esto ayuda a que Spring Boot cree las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

